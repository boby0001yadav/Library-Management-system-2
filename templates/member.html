{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">👤 Member Dashboard</h2>

<div class="row">

  {% for book in books %}
  <div class="col-md-4 mb-3">
    <div class="card shadow-sm p-3">

      <h5>{{ book[1] }}</h5>
      <p class="text-muted">Author: {{ book[2] }}</p>

      {% if book[3] == 1 %}
        <span class="badge bg-success">Available</span>
      {% else %}
        <span class="badge bg-danger">Issued</span>
      {% endif %}

    </div>
  </div>
  {% endfor %}

</div>

{% endblock %}
